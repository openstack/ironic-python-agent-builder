name: "[IPA] Build ramdisk and upload to S3"

# Builds the Ironic Python Agent ramdisk using diskimage-builder and uploads
# the resulting package to the fluidstack-artifacts S3 bucket.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ipa-ramdisk-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight build

jobs:
  build-and-upload:
    name: Build IPA ramdisk (${{ matrix.name }}) and upload to S3
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - name: fish
            distro: centos
            release: 9-stream
            image_prefix: ipa-centos9
            extra_elements: ""
          - name: ironwood
            distro: ubuntu
            release: noble
            image_prefix: ipa-ubuntu-noble-ironwood
            extra_elements: "fluidstack-ironwood"
          - name: gpu-noble
            distro: ubuntu
            release: noble
            image_prefix: ipa-ubuntu-noble-gpu
            extra_elements: "fluidstack-gpu"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            curl \
            debootstrap \
            dosfstools \
            gdisk \
            genisoimage \
            kpartx \
            parted \
            python3-venv \
            qemu-utils \
            squashfs-tools

      - name: Derive build metadata
        id: meta
        run: |
          IPA_BRANCH="${{ vars.IPA_OPENSTACK_BRANCH }}"
          BRANCH_PATH="${IPA_BRANCH//\//-}"
          IMAGE_NAME="${{ matrix.image_prefix }}-${BRANCH_PATH}-fs"

          # Map branch to OpenStack constraints series
          if [[ "${IPA_BRANCH}" == stable/* ]]; then
            SERIES="${IPA_BRANCH#stable/}"
          else
            SERIES="master"
          fi
          CONSTRAINTS="https://releases.openstack.org/constraints/upper/${SERIES}"

          echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "constraints=${CONSTRAINTS}" >> "${GITHUB_OUTPUT}"
          echo "::notice::Image: ${IMAGE_NAME} | IPA branch: ${IPA_BRANCH} | Constraints: ${CONSTRAINTS}"

      - name: Install ironic-python-agent-builder
        run: |
          python3 -m venv "${HOME}/.local/ipa-builder"
          "${HOME}/.local/ipa-builder/bin/pip" install . \
            -c "${{ steps.meta.outputs.constraints }}"
          echo "${HOME}/.local/ipa-builder/bin" >> "${GITHUB_PATH}"

      - name: Write debug SSH key
        run: |
          echo "${{ secrets.IPA_DEBUG_SSH_PUBKEY }}" > /tmp/ipa-debug-key.pub

      - name: Build IPA ramdisk
        env:
          # Increase from default 30s — mirrors the upstream Zuul job
          DIB_DHCP_TIMEOUT: "60"
          DIB_IPA_ENABLE_RESCUE: "false"
          DIB_DEV_USER_USERNAME: debug
          DIB_DEV_USER_AUTHORIZED_KEYS: /tmp/ipa-debug-key.pub
          DIB_DEV_USER_PWDLESS_SUDO: "yes"
          MATRIX_EXTRA_ELEMENTS: ${{ matrix.extra_elements }}
        run: |
          EXTRA_ELEMENTS=()

          for el in ${MATRIX_EXTRA_ELEMENTS}; do
            EXTRA_ELEMENTS+=(--element "$el")
          done

          # Include devuser element only when a real key is provided
          if grep -qE '^(ssh|ecdsa|sk-)' /tmp/ipa-debug-key.pub 2>/dev/null; then
            EXTRA_ELEMENTS+=(--element devuser)
          fi

          ironic-python-agent-builder \
            --lzma \
            --output "${{ steps.meta.outputs.image_name }}" \
            --release "${{ matrix.release }}" \
            --branch "${{ vars.IPA_OPENSTACK_BRANCH }}" \
            --verbose \
            "${EXTRA_ELEMENTS[@]}" \
            "${{ matrix.distro }}"

          IMAGE="${{ steps.meta.outputs.image_name }}"
          tar czvf "${IMAGE}.tar.gz" "${IMAGE}.kernel" "${IMAGE}.initramfs" "${IMAGE}.sha256" "${IMAGE}.d"
          sha256sum "${IMAGE}.tar.gz" > "${IMAGE}.tar.gz.sha256"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.FS_ARTIFACTS_AWS_ACCOUNT_ID }}:role/${{ vars.FS_ARTIFACTS_S3_AWS_ROLE_NAME }}
          aws-region: ${{ vars.FS_ARTIFACTS_AWS_REGION }}

      - name: Upload artifacts to S3
        run: |
          IMAGE="${{ steps.meta.outputs.image_name }}"
          S3_PREFIX="s3://${{ vars.FS_ARTIFACTS_BUCKET }}/fluidstack/finz/ipa"
          for ext in tar.gz tar.gz.sha256; do
            aws s3 cp "${IMAGE}.${ext}" "${S3_PREFIX}/${IMAGE}.${ext}"
            echo "::notice::Uploaded ${IMAGE}.${ext}"
          done
